<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost In Space // Stackly.app</title>
    
    <!-- Link your existing style sheets -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="root.css">
    <link rel="stylesheet" href="error.css">
    
    <!-- Premium Fonts Pairing Setup -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons and Scroll Animations Dependencies -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body class="error-canvas-isolated">

    <!-- Premium Luxury Floating Ambient Light Mesh -->
    <div class="error-atmospheric-glow"></div>

    <div class="error-layout-wrapper">
        
        <!-- Big Symmetrical Status Counter Display Panel -->
        <div class="error-numeric-deck" data-aos="zoom-in" data-aos-duration="1200">
            <h1 class="error-giant-code">4<span>0</span>4</h1>
        </div>

        <!-- Narrative Error Meta Text Stack -->
        <div class="error-narrative-deck" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="200">
            <span class="error-micro-tag">Aesthetic Deviation Detected</span>
            <h2>Perspective <span>Lost.</span></h2>
            <div class="error-line-separator"></div>
            <p class="error-description-text">
                The visual matrix link, asset route coordinates, or portfolio layout tier you are searching for has been shifted or archived beyond the platform's public grid tracking flow.
            </p>
        </div>

        <!-- Quick Recovery Luxury Button Action Matrix Row -->
        <div class="error-actions-group" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="400">
            <a href="./index.html" class="btn-social-base btn-app-primary error-home-btn">
                <i class="fa-solid fa-house"></i> Return to Feed
            </a>
            <button onclick="window.history.back()" class="btn-social-base btn-app-secondary error-back-btn">
                <i class="fa-solid fa-arrow-left"></i> Step Back
            </button>
        </div>

    </div>

    <!-- Script loaders initialization execution arrays -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            easing: 'ease-in-out',
            once: true
        });
    </script>
</body>
</html>
